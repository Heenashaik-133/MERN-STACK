<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>simple website</title>
<body>
    
        <style>
            
        body{
            font-family: Arial;
            margin: 0;
        }

        .header{
            background-color: lightcyan;
            padding: 20px;
            text-align: center;
        }
        .nav{
            background-color: #333;
            padding: 10px;
            text-align: center;
        }
        .nav a{
            color: white;
            text-decoration: none;
            margin: 15px;
            font-size: 18px;
            padding: 8px 12px;
        }
        .nav a:hover{
            background-color: pink;
            color: lightseagreen;
            border-radius: 5px;
        }
        .content{
            padding: 30px;
            margin: 20px;
            border: none;
        }
        .footer{
            background-color: lightsalmon;
            text-align: center;
            padding: 15px;
        }
        .login-box input{
            width: 300px;
            padding: 20px;
            border: non2px solid gray;
            background-color: wheat;
            text-align: center;
            border-radius: 6px;
        }
        .login-box input{
            width: 90%;
            padding: 8px;
            margin: 10px;
        }
        .login-box button{
            padding: 8px 15px;
            background-color: lightpink;
            border: 2px solid gray;
            cursor: pointer;
        }
        .login-box button:hover{
            background-color: orchid;

        }
        .footer{
            background-color: aquamarine;
            text-align: center;
            padding: 15px;
        }
        </style>
    </head>
    <body>
        <div class="header">
            <h1>Annamacharya University</h1>
        </div>
        <div class="nav">
          <a href="home.html">Back to Home</a>
          <a href="about.html">About</a>
          <a href="https://youtu.be/6C1MlNW0PvM" target="_blank">Contact</a>
        </div>
        <div class="content">
            <h2>Welcome to my website</h2>
            <p> this is a simple website layout created using HTML and CSS.</p>
            <div class="login-box">
                <h3>Student login</h3>
                <form>
                    <label>Registration Number</label><br>
                    <input type="text" placeholder="enter regidtation number"><br>
                    <label>password</label><br>
                    <input type="password" placeholder="enter password"><br>
                    <button type="submit">login</button>
                </form>
            </div>

        </div>
        <div class="content"></div>
        <div class="footer">
            <p>@ 2026 my website</p>
        </div>
    </body>


</html>
